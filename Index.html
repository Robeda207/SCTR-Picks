<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCTR Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>SCTR Leaders Dashboard</h1>

  <div class="controls">
    <input id="ticker" placeholder="Ticker (e.g. NVDA)">
    <input id="sctr" type="number" placeholder="SCTR (0-100)">
    <button onclick="addStock()">Add / Update</button>
    <button onclick="clearAll()">Clear All</button>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortBy('ticker')">Ticker</th>
        <th onclick="sortBy('sctr')">SCTR</th>
      </tr>
    </thead>
    <tbody id="stockTable"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
